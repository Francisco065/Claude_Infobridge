version: '3.9'
# ============================================================
#  INFOBRIDGE — Docker Compose DEV
#  Mais simples que o prod: hot-reload, portas expostas, sem worker
#  Comando: docker compose -f docker-compose.dev.yml up
# ============================================================
services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: infobridge_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       infobridge_dev
      POSTGRES_USER:     infobridge
      POSTGRES_PASSWORD: dev_senha_123
    volumes:
      - db_dev_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infobridge -d infobridge_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: infobridge_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass dev_redis_123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_redis_123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder          # usa o estágio de build para hot-reload
    container_name: infobridge_api_dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./api/src:/app/src:ro  # hot-reload do código fonte
    ports:
      - "3000:3000"
    command: npm run start:dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_dev_data:
